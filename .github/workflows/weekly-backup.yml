name: Weekly Data Backup

on:
  schedule:
    # 毎週日曜 0:00 UTC (9:00 JST)
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backup tag
        run: |
          DATE=$(date +%Y%m%d)
          TAG="backup/data-${DATE}"

          # data/ ディレクトリにファイルがあるか確認
          if [ -z "$(find data/ -name '*.json' 2>/dev/null)" ]; then
            echo "No data files to backup"
            exit 0
          fi

          # データサイズを表示
          echo "=== Data files ==="
          find data/ -name '*.json' -exec ls -lh {} \;
          echo ""

          # タグを作成（同名タグがあればスキップ）
          git config user.name "snshack-bot"
          git config user.email "bot@snshack.local"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Weekly data backup ${DATE}"
            git push origin "$TAG"
            echo "Created backup tag: $TAG"
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-backup-${{ github.run_id }}
          path: data/
          retention-days: 90

      - name: Cleanup old backup tags (keep last 12 weeks)
        run: |
          # 12週より古いバックアップタグを削除
          git fetch --tags
          TAGS=$(git tag -l 'backup/data-*' | sort | head -n -12)
          for tag in $TAGS; do
            echo "Deleting old backup tag: $tag"
            git push origin ":refs/tags/$tag" 2>/dev/null || true
            git tag -d "$tag" 2>/dev/null || true
          done
