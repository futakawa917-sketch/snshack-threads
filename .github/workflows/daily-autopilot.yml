name: Daily Autopilot

on:
  schedule:
    # 各投稿時刻に実行 (JST → UTC変換)
    # 7:30 JST = 22:30 UTC (前日)
    - cron: '30 22 * * *'
    # 12:00 JST = 3:00 UTC
    - cron: '0 3 * * *'
    # 18:00 JST = 9:00 UTC
    - cron: '0 9 * * *'
    # 19:30 JST = 10:30 UTC
    - cron: '30 10 * * *'
    # 21:00 JST = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # 手動実行も可能

env:
  THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TZ: Asia/Tokyo

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[ai]"

      - name: Restore profile data
        uses: actions/cache/restore@v4
        with:
          path: ~/.snshack-threads
          key: snshack-data-${{ github.run_id }}
          restore-keys: snshack-data-

      - name: Setup profile
        run: |
          mkdir -p ~/.snshack-threads/profiles/default
          python -c "
          import json, os
          config = {
              'profile_name': 'default',
              'threads_access_token': os.environ['THREADS_ACCESS_TOKEN'],
              'anthropic_api_key': os.environ['ANTHROPIC_API_KEY'],
              'genre': os.environ.get('PROFILE_GENRE', ''),
              'research_keywords': os.environ.get('RESEARCH_KEYWORDS', ''),
              'timezone': 'Asia/Tokyo',
              'posts_per_day': 5,
              'short_post_ratio': 0.5,
          }
          config_path = os.path.expanduser('~/.snshack-threads/profiles/default/config.json')
          if os.path.exists(config_path):
              existing = json.loads(open(config_path).read())
              existing.update({k: v for k, v in config.items() if v})
              config = existing
          with open(config_path, 'w') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          "
        env:
          PROFILE_GENRE: ${{ secrets.PROFILE_GENRE }}
          RESEARCH_KEYWORDS: ${{ secrets.RESEARCH_KEYWORDS }}

      - name: Copy style guide and hooks
        run: |
          [ -f data/style_guide.md ] && cp data/style_guide.md ~/.snshack-threads/profiles/default/
          [ -f data/hooks.json ] && cp data/hooks.json ~/.snshack-threads/profiles/default/
          true

      - name: Morning tasks (first run only)
        if: github.event.schedule == '30 22 * * *'
        run: |
          echo "=== Morning: Collect metrics ==="
          snshack --profile default collect-threads || echo "Collect skipped"
          snshack --profile default collect-early || echo "Early collect skipped"
          snshack --profile default track-followers || echo "Follower tracking skipped"

          echo "=== Morning: Generate daily plan ==="
          snshack --profile default autopilot

      - name: Generate plan if no pending posts
        if: github.event_name == 'workflow_dispatch'
        run: |
          PENDING=$(python -c "
          import json; from pathlib import Path
          from snshack_threads.config import get_settings
          s = get_settings(profile='default')
          p = s.profile_dir / 'pending_posts.json'
          if not p.exists(): print('0'); exit()
          entries = json.loads(p.read_text())
          print(sum(1 for e in entries if e['status'] == 'pending'))
          " 2>/dev/null || echo "0")
          echo "Pending posts: $PENDING"
          if [ "$PENDING" = "0" ]; then
            echo "No pending posts, generating new plan..."
            snshack --profile default collect-threads || echo "Collect skipped"
            snshack --profile default autopilot
          else
            echo "Skipping plan generation, $PENDING posts already pending"
          fi

      - name: Publish next post
        run: |
          python -c "
          import json, os
          from pathlib import Path
          from snshack_threads.threads_api import ThreadsGraphClient
          from snshack_threads.config import get_settings

          settings = get_settings(profile='default')
          pending_path = settings.profile_dir / 'pending_posts.json'

          if not pending_path.exists():
              print('No pending file found')
              exit(0)

          entries = json.loads(pending_path.read_text(encoding='utf-8'))
          pending = [e for e in entries if e['status'] == 'pending']

          if not pending:
              print('No pending posts')
              exit(0)

          # Publish the first pending post
          entry = pending[0]
          idx = entries.index(entry)

          print(f'Publishing: {entry[\"hook\"]} ({entry[\"scheduled_hour\"]:02d}:{entry[\"scheduled_minute\"]:02d})')
          print(f'Text: {entry[\"text\"][:80]}...')

          try:
              with ThreadsGraphClient() as client:
                  post_id = client.create_text_post(entry['text'])
                  entries[idx]['status'] = 'published'
                  print(f'Published! Post ID: {post_id}')
          except Exception as e:
              entries[idx]['status'] = f'failed: {e}'
              print(f'Failed: {e}')

          # Save updated status
          pending_path.write_text(
              json.dumps(entries, ensure_ascii=False, indent=2), encoding='utf-8'
          )

          remaining = sum(1 for e in entries if e['status'] == 'pending')
          print(f'Remaining: {remaining} posts')
          "

      - name: Save profile data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.snshack-threads
          key: snshack-data-${{ github.run_id }}
