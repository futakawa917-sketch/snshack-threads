name: Daily Autopilot

on:
  schedule:
    # 毎朝7:00 JST = 22:00 UTC (前日)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[ai]"

      - name: Restore profile data
        uses: actions/cache@v4
        with:
          path: ~/.snshack-threads
          key: snshack-data-${{ github.run_number }}
          restore-keys: |
            snshack-data-

      - name: Setup profile
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROFILE_GENRE: ${{ secrets.PROFILE_GENRE }}
          RESEARCH_KEYWORDS: ${{ secrets.RESEARCH_KEYWORDS }}
        run: |
          mkdir -p ~/.snshack-threads/profiles/default
          cat > ~/.snshack-threads/profiles/default/config.json << EOF
          {
            "profile_name": "default",
            "threads_access_token": "${THREADS_ACCESS_TOKEN}",
            "anthropic_api_key": "${ANTHROPIC_API_KEY}",
            "genre": "${PROFILE_GENRE}",
            "research_keywords": "${RESEARCH_KEYWORDS}",
            "timezone": "Asia/Tokyo",
            "posts_per_day": 5,
            "short_post_ratio": 0.5
          }
          EOF

      - name: Copy style guide and hooks
        run: |
          # Copy style guide if exists in repo
          if [ -f data/style_guide.md ]; then
            cp data/style_guide.md ~/.snshack-threads/profiles/default/style_guide.md
          fi
          if [ -f data/hooks.json ]; then
            cp data/hooks.json ~/.snshack-threads/profiles/default/hooks.json
          fi

      - name: Collect metrics
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          snshack --profile default collect-threads || echo "Collect failed (may be first run)"
          snshack --profile default collect-early || echo "Early collect skipped"
          snshack --profile default track-followers || echo "Follower tracking skipped"

      - name: Run autopilot
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          snshack --profile default autopilot

      - name: Publish scheduled posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          python -c "
          from snshack_threads.timed_publisher import publish_due_posts
          results = publish_due_posts(profile='default')
          for r in results:
              print(r)
          "

      - name: Wait and publish remaining posts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          for i in $(seq 1 24); do
            remaining=$(python -c "
          from snshack_threads.timed_publisher import get_pending_count
          print(get_pending_count(profile='default'))
          ")
            if [ "$remaining" = "0" ]; then
              echo "All posts published"
              break
            fi
            echo "Waiting 10 minutes... ($remaining pending)"
            sleep 600
            python -c "
          from snshack_threads.timed_publisher import publish_due_posts
          results = publish_due_posts(profile='default')
          for r in results:
              print(r)
          "
          done

      - name: Save profile data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.snshack-threads
          key: snshack-data-${{ github.run_number }}
