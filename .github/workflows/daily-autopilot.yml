name: Daily Autopilot

on:
  schedule:
    # 毎時0分に実行 (JST 6:00-23:00 = UTC 21:00-14:00)
    # GitHub Actionsは最大15分の遅延があるが、毎時実行なので確実にカバー
    - cron: '0 * * * *'
  workflow_dispatch: # 手動実行も可能

env:
  THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TZ: Asia/Tokyo

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[ai]"

      - name: Restore profile data
        uses: actions/cache/restore@v4
        with:
          path: ~/.snshack-threads
          key: snshack-data-${{ github.run_id }}
          restore-keys: snshack-data-

      - name: Setup profile
        run: |
          mkdir -p ~/.snshack-threads/profiles/default
          python -c "
          import json, os
          config = {
              'profile_name': 'default',
              'threads_access_token': os.environ['THREADS_ACCESS_TOKEN'],
              'anthropic_api_key': os.environ['ANTHROPIC_API_KEY'],
              'genre': os.environ.get('PROFILE_GENRE', ''),
              'research_keywords': os.environ.get('RESEARCH_KEYWORDS', ''),
              'timezone': 'Asia/Tokyo',
              'posts_per_day': 5,
              'short_post_ratio': 0.5,
          }
          config_path = os.path.expanduser('~/.snshack-threads/profiles/default/config.json')
          if os.path.exists(config_path):
              existing = json.loads(open(config_path).read())
              existing.update({k: v for k, v in config.items() if v})
              config = existing
          with open(config_path, 'w') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          "
        env:
          PROFILE_GENRE: ${{ secrets.PROFILE_GENRE }}
          RESEARCH_KEYWORDS: ${{ secrets.RESEARCH_KEYWORDS }}

      - name: Copy style guide and hooks
        run: |
          [ -f data/style_guide.md ] && cp data/style_guide.md ~/.snshack-threads/profiles/default/
          [ -f data/hooks.json ] && cp data/hooks.json ~/.snshack-threads/profiles/default/
          true

      - name: Smart publish
        run: |
          python -c "
          import json, os
          from datetime import datetime, date
          from pathlib import Path
          from snshack_threads.config import get_settings

          settings = get_settings(profile='default')
          pending_path = settings.profile_dir / 'pending_posts.json'
          now = datetime.now()
          current_hour = now.hour
          current_minute = now.minute
          today_str = date.today().isoformat()

          print(f'Current time: {now.strftime(\"%Y-%m-%d %H:%M:%S %Z\")}')

          # ── Step 1: 朝の処理 (6-8時台、またはpending無し) ──
          need_morning = False
          if pending_path.exists():
              entries = json.loads(pending_path.read_text(encoding='utf-8'))
              # pending_postsが今日の分かチェック
              if entries and entries[0].get('date') != today_str:
                  need_morning = True
                  print('Pending posts are from a previous day, regenerating...')
              elif not any(e['status'] == 'pending' for e in entries):
                  need_morning = True
                  print('All posts already published, regenerating...')
          else:
              need_morning = True
              print('No pending file found')

          if need_morning:
              print('=== Running morning tasks ===')
              import subprocess
              subprocess.run(['snshack', '--profile', 'default', 'collect-threads'], check=False)
              subprocess.run(['snshack', '--profile', 'default', 'collect-early'], check=False)
              subprocess.run(['snshack', '--profile', 'default', 'track-followers'], check=False)
              print('=== Generating daily plan ===')
              subprocess.run(['snshack', '--profile', 'default', 'autopilot'], check=True)

          # ── Step 2: 投稿すべきか判断 ──
          if not pending_path.exists():
              print('No pending file after plan generation')
              exit(0)

          entries = json.loads(pending_path.read_text(encoding='utf-8'))
          pending = [e for e in entries if e['status'] == 'pending']

          if not pending:
              print('No pending posts')
              exit(0)

          # 現在時刻以前にスケジュールされた未投稿を探す
          due = []
          for e in entries:
              if e['status'] != 'pending':
                  continue
              sh = e['scheduled_hour']
              sm = e.get('scheduled_minute', 0)
              # 現在時刻の1時間以内にスケジュールされた投稿を対象
              # (例: 7:30スケジュール → 7:00-8:00の実行で投稿)
              if sh == current_hour or (sh == current_hour - 1 and sm > 0):
                  due.append(e)

          # workflow_dispatchの場合は次の1件を投稿
          if not due and os.environ.get('GITHUB_EVENT_NAME') == 'workflow_dispatch':
              due = [pending[0]]
              print('Manual trigger: publishing next pending post')

          if not due:
              print(f'No posts due at {current_hour:02d}:{current_minute:02d}')
              print(f'Pending schedule: {[(e[\"scheduled_hour\"], e.get(\"scheduled_minute\", 0)) for e in pending]}')
              exit(0)

          # ── Step 3: 投稿 (due分だけ、最大1件) ──
          entry = due[0]
          idx = entries.index(entry)

          print(f'Publishing: {entry[\"hook\"]} ({entry[\"scheduled_hour\"]:02d}:{entry.get(\"scheduled_minute\", 0):02d})')
          print(f'Text: {entry[\"text\"][:80]}...')

          from snshack_threads.threads_api import ThreadsGraphClient
          try:
              with ThreadsGraphClient() as client:
                  post_id = client.create_text_post(entry['text'])
                  entries[idx]['status'] = 'published'
                  print(f'Published! Post ID: {post_id}')
          except Exception as e:
              entries[idx]['status'] = f'failed: {e}'
              print(f'Failed: {e}')

          pending_path.write_text(
              json.dumps(entries, ensure_ascii=False, indent=2), encoding='utf-8'
          )

          remaining = sum(1 for e in entries if e['status'] == 'pending')
          published_today = sum(1 for e in entries if e['status'] == 'published')
          print(f'Published today: {published_today}/5, Remaining: {remaining}')
          "

      - name: Save profile data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.snshack-threads
          key: snshack-data-${{ github.run_id }}
