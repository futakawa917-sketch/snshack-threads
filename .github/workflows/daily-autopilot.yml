name: Daily Autopilot

on:
  schedule:
    # 毎日 JST 7:00 に1回だけ実行 (UTC 22:00)
    # AIで投稿生成 → Threads APIで直接投稿
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        profile: [default]
      fail-fast: false

    concurrency:
      group: autopilot-${{ matrix.profile }}
      cancel-in-progress: false

    env:
      THREADS_ACCESS_TOKEN: ${{ secrets[format('THREADS_TOKEN_{0}', matrix.profile)] || secrets.THREADS_ACCESS_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      METRICOOL_USER_TOKEN: ${{ secrets.METRICOOL_USER_TOKEN }}
      METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
      METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
      TZ: Asia/Tokyo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[ai]"

      - name: Restore profile data from repo
        run: |
          PROFILE_DIR=~/.snshack-threads/profiles/${{ matrix.profile }}
          mkdir -p "$PROFILE_DIR"
          if [ -d data/${{ matrix.profile }} ]; then
            cp -r data/${{ matrix.profile }}/* "$PROFILE_DIR/" 2>/dev/null || true
          fi
          # データ整合性チェック: JSONが壊れていないか確認
          for f in post_history.json follower_snapshots.json pending_posts.json; do
            fp="$PROFILE_DIR/$f"
            if [ -f "$fp" ]; then
              python -c "import json; json.loads(open('$fp').read())" 2>/dev/null || {
                echo "WARNING: $f is corrupted, removing"
                rm "$fp"
              }
            fi
          done

      - name: Setup profile
        run: |
          mkdir -p ~/.snshack-threads/profiles/${{ matrix.profile }}
          python -c "
          import json, os
          config = {
              'profile_name': '${{ matrix.profile }}',
              'threads_access_token': os.environ['THREADS_ACCESS_TOKEN'],
              'anthropic_api_key': os.environ['ANTHROPIC_API_KEY'],
              'user_token': os.environ.get('METRICOOL_USER_TOKEN', ''),
              'user_id': os.environ.get('METRICOOL_USER_ID', ''),
              'blog_id': os.environ.get('METRICOOL_BLOG_ID', ''),
              'genre': os.environ.get('PROFILE_GENRE', ''),
              'research_keywords': os.environ.get('RESEARCH_KEYWORDS', ''),
              'timezone': 'Asia/Tokyo',
              'posts_per_day': 5,
              'short_post_ratio': 0.5,
          }
          config_path = os.path.expanduser('~/.snshack-threads/profiles/${{ matrix.profile }}/config.json')
          if os.path.exists(config_path):
              existing = json.loads(open(config_path).read())
              existing.update({k: v for k, v in config.items() if v})
              config = existing
          with open(config_path, 'w') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          "
        env:
          PROFILE_GENRE: ${{ secrets[format('PROFILE_GENRE_{0}', matrix.profile)] || secrets.PROFILE_GENRE }}
          RESEARCH_KEYWORDS: ${{ secrets[format('RESEARCH_KEYWORDS_{0}', matrix.profile)] || secrets.RESEARCH_KEYWORDS }}

      - name: Copy style guide and hooks
        run: |
          PROFILE_DATA="data/${{ matrix.profile }}"
          PROFILE_DIR=~/.snshack-threads/profiles/${{ matrix.profile }}
          # プロファイル固有のデータディレクトリを優先、なければルートのdataを使用
          if [ -d "$PROFILE_DATA" ]; then
            [ -f "$PROFILE_DATA/style_guide.md" ] && cp "$PROFILE_DATA/style_guide.md" "$PROFILE_DIR/"
            [ -f "$PROFILE_DATA/hooks.json" ] && cp "$PROFILE_DATA/hooks.json" "$PROFILE_DIR/"
          else
            [ -f data/style_guide.md ] && cp data/style_guide.md "$PROFILE_DIR/"
            [ -f data/hooks.json ] && cp data/hooks.json "$PROFILE_DIR/"
          fi
          true

      - name: Check token expiry
        id: token_check
        run: |
          python -c "
          import os, json
          from snshack_threads.threads_api import ThreadsGraphClient

          try:
              with ThreadsGraphClient() as client:
                  info = client.get_token_info()
                  expires_at = info.get('expires_at', 0)
                  if expires_at:
                      import time
                      remaining = expires_at - int(time.time())
                      days_left = remaining // 86400
                      print(f'Token expires in {days_left} days')
                      if days_left <= 7:
                          print(f'Token expiring soon, attempting auto-refresh...')
                          try:
                              new_token = client.refresh_long_lived_token()
                              if new_token:
                                  print(f'Token refreshed successfully!')
                                  days_left = 60  # 更新後は約60日
                              else:
                                  print(f'::warning::Token refresh returned empty result')
                          except Exception as re:
                              print(f'::warning::Token auto-refresh failed: {re}')
                          if days_left <= 7:
                              print(f'::warning::Token for profile ${{ matrix.profile }} expires in {days_left} days!')
                              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                                  f.write(f'token_expiring=true\n')
                                  f.write(f'token_days_left={days_left}\n')
                          else:
                              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                                  f.write('token_expiring=false\n')
                                  f.write(f'token_days_left={days_left}\n')
                      else:
                          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                              f.write('token_expiring=false\n')
                              f.write(f'token_days_left={days_left}\n')
                  else:
                      print('Token expiry info not available')
                      with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                          f.write('token_expiring=false\n')
                          f.write('token_days_left=-1\n')
          except Exception as e:
              print(f'Token check failed: {e}')
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                  f.write('token_expiring=false\n')
                  f.write('token_days_left=-1\n')
          "

      - name: Notify token expiry warning
        if: steps.token_check.outputs.token_expiring == 'true'
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"⚠️ トークン期限切れ警告\\nProfile: ${{ matrix.profile }}\\nトークンの有効期限が残り ${{ steps.token_check.outputs.token_days_left }} 日です。\\n早めにトークンを更新してください。\"}"
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Generate and publish via Threads API
        id: publish
        run: |
          python -c "
          import json, os
          from datetime import datetime, date
          from pathlib import Path
          from snshack_threads.config import get_settings

          settings = get_settings(profile='${{ matrix.profile }}')
          pending_path = settings.profile_dir / 'pending_posts.json'
          now = datetime.now()
          today_str = date.today().isoformat()

          print(f'Current time: {now.strftime(\"%Y-%m-%d %H:%M:%S %Z\")}')

          # ── Step 1: データ収集 & 投稿生成 ──
          need_generate = False
          if pending_path.exists():
              entries = json.loads(pending_path.read_text(encoding='utf-8'))
              if entries and entries[0].get('date') != today_str:
                  need_generate = True
                  print('Pending posts are from a previous day, regenerating...')
              elif not entries:
                  need_generate = True
                  print('Pending file is empty')
              else:
                  already_published = any(e.get('status') == 'published' for e in entries)
                  if already_published:
                      print('Today posts already published. Nothing to do.')
                      with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                          f.write('publish_status=already_scheduled\n')
                      exit(0)
                  need_generate = not any(e['status'] == 'pending' for e in entries)
          else:
              need_generate = True
              print('No pending file found')

          if need_generate:
              print('=== Running morning tasks ===')
              import subprocess
              subprocess.run(['snshack', '--profile', '${{ matrix.profile }}', 'collect-threads'], check=False)
              subprocess.run(['snshack', '--profile', '${{ matrix.profile }}', 'collect-early'], check=False)
              subprocess.run(['snshack', '--profile', '${{ matrix.profile }}', 'track-followers'], check=False)
              try:
                  from snshack_threads.post_history import PostHistory
                  ph = PostHistory(history_path=settings.profile_dir / 'post_history.json')
                  archived = ph.archive_old_records(keep_days=365)
                  if archived:
                      print(f'Archived {archived} old post records')
              except Exception as ae:
                  print(f'Archive check skipped: {ae}')
              print('=== Generating daily plan ===')
              subprocess.run(['snshack', '--profile', '${{ matrix.profile }}', 'autopilot', '--method', 'threads'], check=True)

          # ── Step 2: pending_posts を読み込み ──
          if not pending_path.exists():
              print('No pending file after plan generation')
              exit(0)

          entries = json.loads(pending_path.read_text(encoding='utf-8'))
          pending = [e for e in entries if e['status'] == 'pending']

          if not pending:
              print('No pending posts to schedule')
              exit(0)

          print(f'Found {len(pending)} pending posts to publish via Threads API')

          # ── Step 3: Threads APIで直接投稿 ──
          from snshack_threads.threads_api import ThreadsGraphClient
          from snshack_threads.post_history import PostHistory

          history = PostHistory(history_path=settings.profile_dir / 'post_history.json')

          published_hooks = []
          try:
              with ThreadsGraphClient() as client:
                  for entry in entries:
                      if entry['status'] != 'pending':
                          continue
                      idx = entries.index(entry)
                      h = entry['scheduled_hour']
                      m = entry.get('scheduled_minute', 0)
                      publish_at = now.replace(hour=h, minute=m, second=0, microsecond=0)

                      # まだ時間が来ていない投稿はスキップ
                      if publish_at > now:
                          print(f'  Skipping {entry[\"hook\"]} (scheduled at {h:02d}:{m:02d}, not yet due)')
                          continue

                      print(f'Publishing: {entry[\"hook\"]} (scheduled {h:02d}:{m:02d})')

                      try:
                          post_id = client.create_text_post(entry['text'])
                          entries[idx]['status'] = 'published'
                          entries[idx]['threads_post_id'] = post_id
                          published_hooks.append(entry['hook'])

                          post_type = entry.get('post_type', 'reach')
                          history.record_scheduled(
                              text=entry['text'],
                              publish_at=publish_at,
                              post_type=post_type,
                          )

                          print(f'  Published OK: {entry[\"hook\"]} (post_id={post_id})')
                      except Exception as pe:
                          entries[idx]['status'] = f'failed: {pe}'
                          print(f'  Failed: {entry[\"hook\"]} — {pe}')

                  # 保存
                  pending_path.write_text(
                      json.dumps(entries, ensure_ascii=False, indent=2), encoding='utf-8'
                  )

          except Exception as e:
              pending_path.write_text(
                  json.dumps(entries, ensure_ascii=False, indent=2), encoding='utf-8'
              )
              print(f'Threads API error: {e}')
              if not published_hooks:
                  with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                      f.write(f'publish_status=failed\n')
                      f.write(f'publish_error={e}\n')
                  raise

          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              if published_hooks:
                  sep = ','
                  hooks_str = sep.join(published_hooks)
                  f.write(f'publish_status=success\n')
                  f.write(f'post_hook={hooks_str}\n')

          print(f'Published {len(published_hooks)}/{len(entries)} posts via Threads API')
          "

      - name: Success summary
        if: success()
        run: |
          echo "## 実行サマリー - Profile: ${{ matrix.profile }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **プロファイル**: ${{ matrix.profile }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ステータス**: 成功" >> $GITHUB_STEP_SUMMARY
          echo "- **実行時刻**: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.publish.outputs.publish_status }}" = "success" ]; then
            echo "- **予約投稿**: ${{ steps.publish.outputs.post_hook }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.publish.outputs.publish_status }}" = "already_scheduled" ]; then
            echo "- **予約投稿**: 本日分は予約済み" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **予約投稿**: 生成のみ（予約なし）" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.token_check.outputs.token_expiring }}" = "true" ]; then
            echo "- **⚠️ トークン警告**: 残り ${{ steps.token_check.outputs.token_days_left }} 日" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"⚠️ snshack-threads 投稿エラー\\nProfile: ${{ matrix.profile }}\\nRun: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Save profile data to repo
        if: always()
        run: |
          mkdir -p data/${{ matrix.profile }}
          for f in post_history.json post_history.archive.json follower_snapshots.json hook_theme_matrix.json ab_tests.json pending_posts.json rate_limits.json keyword_snapshots.json; do
            src="$HOME/.snshack-threads/profiles/${{ matrix.profile }}/$f"
            [ -f "$src" ] && cp "$src" data/${{ matrix.profile }}/
          done
          git config user.name "snshack-bot"
          git config user.email "bot@snshack.local"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "auto: update ${{ matrix.profile }} profile data [skip ci]"
            # リトライ付きpush（最大3回）
            for i in 1 2 3; do
              git pull --rebase origin main 2>/dev/null || true
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              fi
              echo "Push failed (attempt $i/3), retrying..."
              sleep 5
            done
          fi

      - name: Backup data to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-data-${{ matrix.profile }}-${{ github.run_id }}
          path: data/${{ matrix.profile }}/
          retention-days: 90
